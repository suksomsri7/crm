services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-crm_secret_2024}@db:5432/crm
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${AUTH_URL:-http://localhost:3000}
    volumes:
      - ./uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # รันครั้งเดียวหลัง deploy ครั้งแรก เพื่อสร้างตารางและ seed
  db-init:
    build:
      context: .
      target: builder
    restart: "no"
    command: sh -c "npx prisma db push --skip-generate && npm run db:seed"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-crm_secret_2024}@db:5432/crm
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - init

volumes:
  pgdata:
